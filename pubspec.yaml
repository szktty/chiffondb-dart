name: chiffondb
description: >-
  Dart FFI bindings for ChiffonDB — a lightweight embedded property graph
  database. Provides a Connection API and @NodeType/@EdgeType code generation
  via flutter_rust_bridge.
version: 0.1.0
homepage: https://github.com/szktty/chiffondb
repository: https://github.com/szktty/chiffondb
issue_tracker: https://github.com/szktty/chiffondb/issues
topics:
  - graph
  - database
  - embedded
  - ffi
  - flutter-rust-bridge

platforms:
  android:
  ios:
  linux:
  macos:
  windows:

environment:
  sdk: ^3.11.0

dependencies:
  flutter_rust_bridge: ^2.12.0
  freezed_annotation: ^3.0.0
  ffi: ^2.1.3
  archive: ^3.6.0
  code_assets: ^1.2.1
  hooks: ^2.0.2
  http: ^1.6.0
  path: ^1.9.1

dev_dependencies:
  build_runner: ^2.4.15
  freezed: ^3.0.0
  kiri_check: ^1.3.1
  lints: ^6.0.0
  chiffondb_generator: ^0.1.0
  test: ^1.25.6
